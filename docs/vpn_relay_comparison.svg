<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg">
<style>
text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
.h{font-size:14px;font-weight:600}
.s{font-size:11.5px}
.lb{font-size:10.5px;text-anchor:middle}

.c1 rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.75}
.c1 .h{fill:#2C2C2A} .c1 .s{fill:#5F5E5A}
.c2 rect{fill:#FCEBEB;stroke:#A32D2D;stroke-width:.75}
.c2 .h{fill:#501313} .c2 .s{fill:#A32D2D}
.c3 rect{fill:#E6F1FB;stroke:#185FA5;stroke-width:.75}
.c3 .h{fill:#042C53} .c3 .s{fill:#185FA5}
.c4 rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.75}
.c4 .h{fill:#04342C} .c4 .s{fill:#0F6E56}
.c5 rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:.75}
.c5 .h{fill:#26215C} .c5 .s{fill:#534AB7}

.arr{stroke:#57606a;stroke-width:1.5;fill:none}
.arr-r{stroke:#A32D2D;stroke-width:1.5;fill:none}
.arr-g{stroke:#0F6E56;stroke-width:1.5;fill:none}
.arr-t{stroke:#57606a;stroke-width:1;fill:none;stroke-dasharray:5 3}
.lb{fill:#57606a}
.nt{fill:#8b949e;font-size:11px}
.tt{font-size:13px;font-weight:600;text-anchor:middle}
.sep{stroke:#57606a;stroke-width:.5;stroke-dasharray:4 4;opacity:.25}
.leg{font-size:11px;fill:#57606a}

@media(prefers-color-scheme:dark){
.c1 rect{fill:#444441;stroke:#B4B2A9} .c1 .h{fill:#F1EFE8} .c1 .s{fill:#B4B2A9}
.c2 rect{fill:#791F1F;stroke:#F09595} .c2 .h{fill:#FCEBEB} .c2 .s{fill:#F7C1C1}
.c3 rect{fill:#0C447C;stroke:#85B7EB} .c3 .h{fill:#E6F1FB} .c3 .s{fill:#B5D4F4}
.c4 rect{fill:#085041;stroke:#5DCAA5} .c4 .h{fill:#E1F5EE} .c4 .s{fill:#9FE1CB}
.c5 rect{fill:#3C3489;stroke:#AFA9EC} .c5 .h{fill:#EEEDFE} .c5 .s{fill:#CECBF6}
.arr{stroke:#8b949e} .arr-r{stroke:#F09595} .arr-g{stroke:#5DCAA5} .arr-t{stroke:#8b949e}
.lb{fill:#8b949e} .nt{fill:#656d76} .sep{stroke:#8b949e} .leg{fill:#8b949e}
}
</style>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M1 2L7 5L1 8" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="arr"/></marker>
<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M1 2L7 5L1 8" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="arr-r"/></marker>
<marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M1 2L7 5L1 8" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="arr-g"/></marker>
<marker id="at" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M1 2L7 5L1 8" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="arr-t"/></marker>
</defs>

<!-- Top: Single-hop -->
<text class="tt" x="340" y="22" style="fill:#A32D2D">Single-hop (exit only)</text>

<g class="c1"><rect x="40" y="36" width="110" height="44" rx="8"/>
<text class="h" x="95" y="52" text-anchor="middle" dominant-baseline="central">Client</text></g>

<line x1="152" y1="58" x2="198" y2="58" class="arr-r" marker-end="url(#ar)"/>

<g class="c2"><rect x="200" y="36" width="110" height="44" rx="8"/>
<text class="h" x="255" y="52" text-anchor="middle" dominant-baseline="central">Observer</text>
<text class="s" x="255" y="68" text-anchor="middle" dominant-baseline="central">network path</text></g>

<line x1="312" y1="58" x2="388" y2="58" class="arr-r" marker-end="url(#ar)"/>

<g class="c3"><rect x="390" y="36" width="120" height="44" rx="8"/>
<text class="h" x="450" y="52" text-anchor="middle" dominant-baseline="central">Exit Node</text>
<text class="s" x="450" y="68" text-anchor="middle" dominant-baseline="central">remote region</text></g>

<line x1="512" y1="58" x2="558" y2="58" class="arr" marker-end="url(#a)"/>

<g class="c1"><rect x="560" y="40" width="80" height="36" rx="8"/>
<text class="h" x="600" y="60" text-anchor="middle" dominant-baseline="central">Internet</text></g>

<text class="nt" x="255" y="100" text-anchor="middle">Sees: TLS to remote IP, SNI/IP mismatch</text>
<text class="nt" x="255" y="114" text-anchor="middle" style="fill:#A32D2D">Single point of metadata exposure</text>

<!-- Separator -->
<line x1="50" y1="138" x2="630" y2="138" class="sep"/>

<!-- Bottom: Multi-hop -->
<text class="tt" x="340" y="164" style="fill:#0F6E56">Multi-hop (relay + exit)</text>

<g class="c1"><rect x="16" y="178" width="100" height="44" rx="8"/>
<text class="h" x="66" y="194" text-anchor="middle" dominant-baseline="central">Client</text></g>

<line x1="118" y1="200" x2="148" y2="200" class="arr-g" marker-end="url(#ag)"/>

<g class="c4"><rect x="150" y="178" width="100" height="44" rx="8"/>
<text class="h" x="200" y="194" text-anchor="middle" dominant-baseline="central">Observer</text>
<text class="s" x="200" y="210" text-anchor="middle" dominant-baseline="central">network path</text></g>

<line x1="252" y1="200" x2="282" y2="200" class="arr-g" marker-end="url(#ag)"/>

<g class="c5"><rect x="284" y="178" width="108" height="44" rx="8"/>
<text class="h" x="338" y="194" text-anchor="middle" dominant-baseline="central">Relay Node</text>
<text class="s" x="338" y="210" text-anchor="middle" dominant-baseline="central">local region</text></g>

<line x1="394" y1="200" x2="424" y2="200" class="arr-t" marker-end="url(#at)"/>

<g class="c3"><rect x="426" y="178" width="108" height="44" rx="8"/>
<text class="h" x="480" y="194" text-anchor="middle" dominant-baseline="central">Exit Node</text>
<text class="s" x="480" y="210" text-anchor="middle" dominant-baseline="central">remote region</text></g>

<line x1="536" y1="200" x2="568" y2="200" class="arr" marker-end="url(#a)"/>

<g class="c1"><rect x="570" y="182" width="80" height="36" rx="8"/>
<text class="h" x="610" y="202" text-anchor="middle" dominant-baseline="central">Internet</text></g>

<text class="nt" x="200" y="242" text-anchor="middle">Sees: TLS to local IP, consistent SNI</text>
<text class="nt" x="200" y="256" text-anchor="middle" style="fill:#0F6E56">Metadata segmented across hops</text>
<text class="nt" x="460" y="242" text-anchor="middle">Encrypted VLESS tunnel</text>
<text class="nt" x="460" y="256" text-anchor="middle">fragmented ClientHello</text>

<!-- Legend -->
<rect x="140" y="274" width="12" height="12" rx="2" fill="#0F6E56" opacity=".7"/>
<text class="leg" x="158" y="284">Consistent metadata</text>
<rect x="295" y="274" width="12" height="12" rx="2" fill="#A32D2D" opacity=".7"/>
<text class="leg" x="313" y="284">Exposed metadata</text>
<line x1="430" y1="280" x2="458" y2="280" class="arr-t"/>
<text class="leg" x="464" y="284">Encrypted tunnel</text>
</svg>
